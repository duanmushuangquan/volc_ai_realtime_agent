# GitHub Actions CI/CD 主流程示例
# 由于 Token 缺少 workflow scope，此文件作为参考
# 复制到 .github/workflows/ 目录即可使用

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install flake8 black
      - run: make lint || echo "Lint not configured"

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          [ "$RUNNER_OS" == "Linux" ] && sudo apt-get update && sudo apt-get install -y build-essential cmake
          [ "$RUNNER_OS" == "macOS" ] && brew install cmake
      - run: mkdir -p build && cd build && cmake .. && cmake --build .
      - uses: actions/upload-artifact@v4
        with: { name: build-${{ matrix.os }}, path: build/*, retention-days: 7 }

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install pytest
      - uses: actions/download-artifact@v4
        with: { name: build-ubuntu-latest, path: build }
      - run: make test || echo "Tests not configured"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    if: always()
    steps:
      - run: |
          echo "Status: lint=${{ needs.lint.result }}, build=${{ needs.build.result }}, test=${{ needs.test.result }}"
          [ "${{ needs.lint.result }}" == "success" ] && echo "✅ All passed!" || echo "❌ Failed!"
