# Robot Control System Configuration
app:
  name: "Robot Control System"
  version: "1.0.0"
  debug: true
  host: "0.0.0.0"
  port: 5000

# Volcano Engine API Configuration
volcengine:
  app_id: "${VOLC_APP_ID}"
  token: "${VOLC_TOKEN}"
  api_key: "${COZE_API_KEY}"
  space_id: "${COZE_SPACE_ID}"
  
  # RTC Configuration
  rtc:
    app_id: "${RTC_APP_ID}"
    token: "${RTC_TOKEN}"
    room_id: "robot-room-001"
    user_id: "robot-001"
  
  # Model Configuration
  model:
    name: "doubao-seed-1.8"
    temperature: 0.7
    max_tokens: 2048
    top_p: 0.95

# AI Agent Configuration
agent:
  # LangGraph State Graph
  checkpointer:
    enabled: true
    type: "memory"  # memory, sqlite, postgres
  
  # Tools Configuration
  tools:
    web_search:
      enabled: true
      max_results: 5
    knowledge_base:
      enabled: true
      top_k: 3
    command_execution:
      enabled: true
      allowed_commands:
        - "ls"
        - "pwd"
        - "cat"
        - "echo"
        - "date"
        - "whoami"
    file_operations:
      enabled: true
      allowed_paths:
        - "/tmp"
        - "/home/pi"
  
  # Conversation Configuration
  conversation:
    max_history: 20
    system_prompt: |
      你是一个智能机器人控制系统助手。你可以：
      1. 回答用户问题
      2. 执行系统命令（安全范围内）
      3. 搜索网络信息
      4. 检索知识库
      5. 控制机器人硬件
      
      请保持对话简洁、专业、安全。
  
  # Streaming Configuration
  streaming:
    enabled: true
    chunk_size: 50

# Audio Configuration
audio:
  sample_rate: 16000
  channels: 1
  format: "int16"
  asr_model: "whisper-base"  # whisper model size
  tts_voice: "female_yunyang"
  
# Hardware Configuration
hardware:
  serial:
    enabled: false
    port: "/dev/ttyUSB0"
    baudrate: 115200
  
  can:
    enabled: false
    channel: "can0"
    bustype: "socketcan"
  
  gpio:
    enabled: false
    board: "RPI"  # RPI, BANANAPI, etc.

# Database Configuration
database:
  vector_db:
    type: "chroma"  # chroma, pinecone, milvus
    persist_directory: "/tmp/vector_db"
    collection_name: "robot_knowledge"
  
  conversation_db:
    type: "sqlite"  # sqlite, postgres
    path: "/tmp/conversations.db"

# Logging Configuration
logging:
  level: "INFO"
  format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
  file: "/tmp/robot_control.log"
  rotation: "100 MB"
  retention: "7 days"

# Web Interface Configuration
web:
  title: "Robot Control System"
  description: "AI-powered Robot Control Interface"
  theme: "dark"
  enable_docs: true
