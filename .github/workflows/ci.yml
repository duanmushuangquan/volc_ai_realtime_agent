# GitHub Actions CI/CD 主流程
# 文档: docs/research/CICD_webhook.md
# 计划: docs/plan/CICD_webhook_plan.md

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# 允许并发执行，保留最新构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: 代码检查 (lint)
  # ============================================================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: |
          pip install flake8 black cmake-format

      - name: Check for Python code
        id: check_python
        run: |
          if ls src/python/*.py 2>/dev/null | grep -q .; then
            echo "has_python=true" >> $GITHUB_OUTPUT
          else
            echo "has_python=false" >> $GITHUB_OUTPUT
          fi
          echo "Has Python code: $has_python"

      - name: Check for CMakeLists.txt
        id: check_cmake
        run: |
          if [ -f "CMakeLists.txt" ]; then
            echo "has_cmake=true" >> $GITHUB_OUTPUT
          else
            echo "has_cmake=false" >> $GITHUB_OUTPUT
          fi
          echo "Has CMakeLists.txt: $has_cmake"

      - name: Lint Python
        if: steps.check_python.outputs.has_python == 'true'
        run: |
          pip install flake8 black
          flake8 src/python --max-line-length=120 --extend-ignore=E203,W503 || true
          black --check src/python || true

      - name: Lint CMake
        if: steps.check_cmake.outputs.has_cmake == 'true'
        run: |
          pip install cmake-format
          cmake-format --check src/CMakeLists.txt 2>/dev/null || echo "cmake-format check skipped"

      - name: Check code format
        run: |
          find . -name "*.py" -exec black --check {} \; 2>/dev/null || true
          find . -name "CMakeLists.txt" -exec cmake-format --check {} \; 2>/dev/null || true

  # ============================================================
  # Job 2: 构建 (多平台)
  # ============================================================
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: macos-latest
            compiler: clang

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Setup macOS
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Check for CMakeLists.txt
        id: check_cmake
        run: |
          if [ -f "CMakeLists.txt" ]; then
            echo "has_cmake=true" >> $GITHUB_OUTPUT
          else
            echo "has_cmake=false" >> $GITHUB_OUTPUT
          fi
          echo "Project has CMakeLists.txt: $has_cmake"

      - name: Configure CMake
        if: steps.check_cmake.outputs.has_cmake == 'true'
        run: |
          mkdir -p build
          cd build
          cmake .. -G Ninja

      - name: Build
        if: steps.check_cmake.outputs.has_cmake == 'true'
        run: |
          cd build
          cmake --build . --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ matrix.os }}
          path: |
            build/**/*.a
            build/**/*.so
            build/**/*.dylib
            build/**/*.exe
          retention-days: 7

  # ============================================================
  # Job 3: 单元测试
  # ============================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov

      - name: Check for Python tests
        id: check_python_tests
        run: |
          if ls tests/unit/test_*.py 2>/dev/null | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Python tests
        if: steps.check_python_tests.outputs.has_tests == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/unit -v --cov=src.python --cov-report=term-missing || pytest tests/unit -v

      - name: Run tests
        run: |
          make test || echo "Tests not configured yet"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            *.xml
            *.html
            build/**/*.log
          retention-days: 7

  # ============================================================
  # Job 4: 通知 (完成后)
  # ============================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    if: always()
    steps:
      - name: Check status
        run: |
          echo "Workflow status: ${{ needs.*.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Test: ${{ needs.test.result }}"

      - name: Send success notification
        if: needs.lint.result == 'success' && needs.build.result == 'success' && needs.test.result == 'success'
        run: |
          echo "✅ All jobs passed!"

      - name: Send failure notification
        if: needs.*.result == 'failure'
        run: |
          echo "❌ Some jobs failed!"
          echo "Check: https://github.com/${{ github.repository }}/actions"
